<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<meta charset="UTF-8">
<title>Keuangan Harian</title>



<style>

body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  height: 100vh;
}

.container {
  text-align: center;
  width: 300px;
}

h2 {
  margin-bottom: 20px;
}

/* input */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;

  border-radius: 10px;
  border: none;
  outline: none;

  box-sizing: border-box;
}

/* tombol */
.btn {

  position: relative;

  width: 100%;
  padding: 12px;

  border: 2px solid #F6D5AC;
  border-radius: 20px;

  background: transparent;
  color: #F6D5AC;

  cursor: pointer;

  overflow: hidden;

  margin-top: 10px;

  transition: 0.3s ease;
}

.btn span {
  position: relative;
  z-index: 2;
}

.btn::after {

  content: "";

  position: absolute;
  inset: 0;

  background: #F6D5AC;

  border-radius: 20px;

  transform: scale(0);
  transform-origin: bottom right;

  transition: 0.3s ease;

  z-index: 1;
}

.btn:hover {
  color: #0f172a;
}

.btn:hover::after {
  transform: scale(1);
}

/* form */
.form {
  display: none;
}

.active {
  display: block;
}

.link {

  margin-top: 10px;

  cursor: pointer;

  color: #F6D5AC;

  font-size: 14px;
}

/* back */
.btn-back {

  position: absolute;

  top: 20px;
  left: 20px;

  padding: 8px 16px;

  border: 2px solid #F6D5AC;
  border-radius: 15px;

  background: transparent;
  color: #F6D5AC;

  cursor: pointer;

  transition: 0.3s ease;
}

.btn-back:hover {
  background: #F6D5AC;
  color: #0f172a;
}

</style>
</head>

<body>

<div class="container">

  <button class="btn-back" onclick="goBack()">
    ← Kembali
  </button>

  <!-- LOGIN -->
  <div id="loginForm" class="form active">

    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email" required>
    <input type="password" id="loginPassword" placeholder="Password" required>

    <button class="btn" onclick="login()">
      <span>Login</span>
    </button>

    <div class="link" onclick="showSignup()">
      Belum punya akun? Sign Up
    </div>

  </div>

  <!-- SIGN UP -->
  <div id="signupForm" class="form">

    <h2>Sign Up</h2>

    <input type="email" id="signupEmail" placeholder="Email" required>
    <input type="password" id="signupPassword" placeholder="Password" required>

    <button class="btn" onclick="signup()">
      <span>Sign Up</span>
    </button>

    <div class="link" onclick="showLogin()">
      Sudah punya akun? Login
    </div>

  </div>

</div>

<script>

/* =========================
   LOCAL STORAGE USERS
========================= */

let users =
  JSON.parse(localStorage.getItem("users")) || [];

/* SIGNUP */
function signup() {

  const email =
    document.getElementById("signupEmail").value;

  const password =
    document.getElementById("signupPassword").value;

  if (!email || !password) {
    alert("Isi semua data!");
    return;
  }

  const exists =
    users.find(u => u.email === email);

  if (exists) {
    alert("Email sudah terdaftar!");
    return;
  }

  users.push({
    email,
    password
  });

  localStorage.setItem(
    "users",
    JSON.stringify(users)
  );

  alert("Sign up berhasil!");

  showLogin();
}

/* LOGIN */
function login() {

  const email =
    document.getElementById("loginEmail").value;

  const password =
    document.getElementById("loginPassword").value;

  const user =
    users.find(u =>
      u.email === email &&
      u.password === password
    );

  if (!user) {
    alert("Email atau password salah!");
    return;
  }

  localStorage.setItem("currentUser", email);

  alert("Login berhasil!");

  window.location.href =
    "dashboard.html";
}

/* SWITCH FORM */
function showSignup() {

  document.getElementById("loginForm")
    .classList.remove("active");

  document.getElementById("signupForm")
    .classList.add("active");
}

function showLogin() {

  document.getElementById("signupForm")
    .classList.remove("active");

  document.getElementById("loginForm")
    .classList.add("active");
}

/* BACK */
function goBack() {

  window.location.href =
    "index.html";
}

</script>

</body>
</html>

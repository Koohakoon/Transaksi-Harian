<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="stylesheet" href="cursor.css">
<meta charset="UTF-8">
<title>Keuangan Harian</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  width: 300px;
}

h2 {
  margin-bottom: 20px;
}

/* input */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
}

/* tombol */
.btn {
  position: relative;
  width: 100%;
  padding: 12px;
  border: 2px solid #F6D5AC;
  border-radius: 20px;
  background: transparent;
  color: #F6D5AC;
  cursor: pointer;
  overflow: hidden;
  margin-top: 10px;
}

/* efek sama seperti sebelumnya (dipersingkat) */
.btn span {
  position: relative;
  z-index: 2;
}

.btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: #F6D5AC;
  border-radius: 20px;
  transform: scale(0);
  transform-origin: bottom right;
  transition: 0.3s;
}

.btn:hover {
  color: #0f172a;
}

.btn:hover::after {
  transform: scale(1);
}

/* form */
.form {
  display: none;
}

.active {
  display: block;
}

.link {
  margin-top: 10px;
  cursor: pointer;
  color: #F6D5AC;
  font-size: 14px;
}

.btn-back {
  position: absolute;
  top: 20px;
  left: 20px;
  padding: 8px 16px;
  border: 2px solid #F6D5AC;
  border-radius: 15px;
  background: transparent;
  color: #F6D5AC;
  cursor: pointer;
  transition: 0.3s ease;
}

.btn-back:hover {
  background: #F6D5AC;
  color: #0f172a;
}
</style>
</head>

<body>

<div class="container">
  <button class="btn-back" onclick="goBack()">← Kembali</button>

  <!-- LOGIN -->
  <div id="loginForm" class="form active">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button class="btn" onclick="login()"><span>Login</span></button>
    <div class="link" onclick="showSignup()">Belum punya akun? Sign Up</div>
  </div>

  <!-- SIGN UP -->
  <div id="signupForm" class="form">
    <h2>Sign Up</h2>
    <input type="email" id="signupEmail" placeholder="Email">
    <input type="password" id="signupPassword" placeholder="Password">
    <button class="btn" onclick="signup()"><span>Sign Up</span></button>
    <div class="link" onclick="showLogin()">Sudah punya akun? Login</div>
  </div>

</div>

<script>
// pindah form
function showSignup() {
  document.getElementById("loginForm").classList.remove("active");
  document.getElementById("signupForm").classList.add("active");
}

function showLogin() {
  document.getElementById("signupForm").classList.remove("active");
  document.getElementById("loginForm").classList.add("active");
}

// SIGN UP
function signup() {
  const email = document.getElementById("signupEmail").value;
  const password = document.getElementById("signupPassword").value;

  if (!email || !password) {
    alert("Isi semua data!");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  // cek email sudah ada
  const exist = users.find(u => u.email === email);
  if (exist) {
    alert("Email sudah terdaftar!");
    return;
  }

  users.push({ email, password });
  localStorage.setItem("users", JSON.stringify(users));

  alert("Sign Up berhasil!");
  showLogin();
}

// LOGIN
function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const user = users.find(u => u.email === email && u.password === password);

  if (user) {
    // simpan session login
    localStorage.setItem("currentUser", email);

    alert("Login berhasil!");
    window.location.href = "dashboard.html";
  } else {
    alert("Email atau password salah!");
  }
}

window.onload = function() {
  const mode = localStorage.getItem("authMode");

  if (mode === "signup") {
    showSignup();
  } else {
    showLogin();
  }
  localStorage.removeItem("authMode");
};

function goBack() {
  window.location.href = "index.html";
}


</script>

<div class="cursor"></div>
<div class="cursor-outline"></div>

<script src="cursor.js"></script>
</body>
</html>

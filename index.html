<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="stylesheet" href="cursor.css">
<meta charset="UTF-8">
<title>Sistem Pencatatan Keuangan Harian</title>

<style>
  
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
.container {
  text-align: center;
}

/* Judul */
h1 {
  font-size: 24px;
  margin-bottom: 40px;
}

/* Tombol */
.btn {
  position: relative;
  display: block;
  width: 220px;
  margin: 15px auto;
  padding: 15px;
  border: 2px solid #F6D5AC;
  border-radius: 20px;
  background: transparent;
  color: #F6D5AC;
  font-size: 16px;
  cursor: pointer;
  overflow: hidden;
  transition: 0.3s ease;
}

/* teks */
.btn span {
  position: relative;
  z-index: 3;
}

/* BACKGROUND SOLID (muncul dari kanan bawah) */
.btn::after {
  content: "";
  position: absolute;
  inset: 0;
  background: #F6D5AC;
  border-radius: 20px;

  transform: scale(0);
  transform-origin: bottom right; /* 🔥 ini kuncinya */

  transition: transform 0.35s ease;
  z-index: 1;
}

/* GLOW (tetap di luar tombol) */
.btn::before {
  content: "";
  position: absolute;
  inset: -6px;
  background: #F6D5AC;
  border-radius: 25px;
  opacity: 0;
  filter: blur(20px);
  transition: opacity 0.4s ease;
  z-index: 0;
}

/* kotak kecil */
.btn .corner {
  position: absolute;
  width: 18px;
  height: 18px;
  bottom: 0;
  right: 0;
  background: #F6D5AC;

  /* segitiga jelas */
  clip-path: polygon(100% 0, 100% 100%, 0 100%);

  z-index: 2;
  transition: 0.3s ease;
}

/* hover */
.btn:hover {
  color: #0f172a;
}

/* expand dari pojok */
.btn:hover::after {
  transform: scale(1);
}

/* glow aktif */
.btn:hover::before {
  opacity: 0.7;
}

/* corner fade */
.btn:hover .corner {
  opacity: 0;
  transform: scale(0.5);
}

/* Supaya teks tetap di atas efek */
.btn span {
  position: relative;
  z-index: 2;
}

.link-admin {
  margin-top: 15px;
  font-size: 14px;
  color: #F6D5AC;
  cursor: pointer;
  transition: 0.3s;
}

.link-admin:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
  <h1>
    Sistem Pencatatan Transaksi Keuangan Harian Berbasis Web Menggunakan Metode RAD
  </h1>

<button class="btn" onclick="goAuth('login')">
  <span>Login</span>
  <div class="corner"></div>
</button>

<button class="btn" onclick="goAuth('signup')">
  <span>Sign Up</span>
  <div class="corner"></div>
</button>

<div class="link-admin" onclick="goAdmin()">Login sebagai Admin</div>
</div>
<script>
function goAuth(mode) {
  localStorage.setItem("authMode", mode);
  window.location.href = "auth.html";
}
function goAdmin() {
  window.location.href = "admin.html";
}
</script>
<div class="cursor"></div>
<div class="cursor-outline"></div>

<script src="cursor.js"></script>
</body>
</html>
